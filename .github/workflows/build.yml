name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore anamnesis.sln

      - name: Build
        run: dotnet build anamnesis.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test anamnesis.sln --no-build --configuration Release
